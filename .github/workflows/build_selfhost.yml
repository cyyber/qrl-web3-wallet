name: Build & Test qrl-web3-wallet

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: [self-hosted, linux, x64, zond]
    steps:
      - uses: actions/checkout@v4

      - name: Clean slate for sibling repos
        run: |
          rm -rf ../web3.js ../wallet.js ../qrypto.js ../js-qrl-cryptography ../qrl-contracts
          rm -rf ~/.cache/yarn ~/.yarn/cache ~/.npm /usr/local/share/.cache/yarn 2>/dev/null || true
          rm -rf ~/.cache/nx
          npx nx reset || true

      - name: Clone and prepare sibling dependencies
        run: |
          clone() {
            local dir="$1" repo="$2"
            if [ ! -d "$dir/.git" ]; then
              rm -rf "$dir"
              git clone --depth 1 "https://github.com/$repo.git" "$dir"
            fi
            cd "$dir" && npm install 2>/dev/null || yarn install --ignore-engines 2>/dev/null
            cd -
          }
          clone ../qrl-contracts        cyyber/qrl-contracts
          clone ../wallet.js            cyyber/wallet.js
          clone ../js-qrl-cryptography  cyyber/js-zond-cryptography
          clone ../qrypto.js            cyyber/qrypto.js

      - name: Build web3.js
        run: |
          if [ ! -d "../web3.js/.git" ]; then
            rm -rf ../web3.js
            git clone --depth 1 "https://github.com/cyyber/web3.js.git" ../web3.js
          fi
          cd ../web3.js
          yarn install --ignore-engines --ignore-scripts
          yarn run clean --concurrency=1
          yarn run build --concurrency=1
          cd -

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Package extension
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          sudo apt-get install -y -qq zip >/dev/null 2>&1 || true
          VERSION=$(jq -r .version package.json)
          mkdir -p qrl-web3-wallet-chrome-v${VERSION}
          cp -r Extension/* qrl-web3-wallet-chrome-v${VERSION}/
          zip -r qrl-web3-wallet-chrome-v${VERSION}.zip qrl-web3-wallet-chrome-v${VERSION}
          echo "ARTIFACT=qrl-web3-wallet-chrome-v${VERSION}.zip" >> $GITHUB_ENV

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: qrl-web3-wallet-chrome
          path: ${{ env.ARTIFACT }}
